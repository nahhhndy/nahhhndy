<svg width="900" height="230" viewBox="0 0 900 230" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Status badges">
  <defs>
    <linearGradient id="sBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A7A7A7" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#545454" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="sGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="230" rx="14" fill="#181818"/>
  <rect x="1" y="1" width="898" height="228" rx="13" fill="#343434" opacity="0.4" stroke="#545454"/>

  <g font-family="JetBrains Mono, monospace" font-size="10" fill="#7A7A7A" letter-spacing="1.5">
    <text x="20" y="22">SYS.MODULES // ACTIVE_STACK</text>
    <text x="806" y="22">v2026</text>
  </g>
  <line x1="20" y1="32" x2="880" y2="32" stroke="#545454"/>

  <!-- badge factory: rows of pills -->
  <g font-family="Inter, sans-serif" font-size="12" font-weight="600">
    <!-- row 1 -->
    <g transform="translate(20,52)">
      <rect width="70" height="28" rx="14" fill="#0D1017" stroke="#A7A7A7" stroke-opacity="0.5"/>
      <text x="35" y="19" text-anchor="middle" fill="#A7A7A7">Python</text>
    </g>
    <g transform="translate(98,52)">
      <rect width="62" height="28" rx="14" fill="#0D1017" stroke="#545454" stroke-opacity="0.5"/>
      <text x="31" y="19" text-anchor="middle" fill="#545454">GenAI</text>
    </g>
    <g transform="translate(168,52)">
      <rect width="92" height="28" rx="14" fill="#0D1017" stroke="#7A7A7A" stroke-opacity="0.5"/>
      <text x="46" y="19" text-anchor="middle" fill="#7A7A7A">LangChain</text>
    </g>
    <g transform="translate(268,52)">
      <rect width="86" height="28" rx="14" fill="#0D1017" stroke="#A7A7A7" stroke-opacity="0.5"/>
      <text x="43" y="19" text-anchor="middle" fill="#A7A7A7">FastAPI</text>
    </g>
    <g transform="translate(362,52)">
      <rect width="62" height="28" rx="14" fill="#0D1017" stroke="#545454" stroke-opacity="0.5"/>
      <text x="31" y="19" text-anchor="middle" fill="#545454">React</text>
    </g>
    <g transform="translate(432,52)">
      <rect width="76" height="28" rx="14" fill="#0D1017" stroke="#7A7A7A" stroke-opacity="0.5"/>
      <text x="38" y="19" text-anchor="middle" fill="#7A7A7A">Next.js</text>
    </g>
    <g transform="translate(516,52)">
      <rect width="76" height="28" rx="14" fill="#0D1017" stroke="#A7A7A7" stroke-opacity="0.5"/>
      <text x="38" y="19" text-anchor="middle" fill="#A7A7A7">PyTorch</text>
    </g>
    <g transform="translate(600,52)">
      <rect width="102" height="28" rx="14" fill="#0D1017" stroke="#545454" stroke-opacity="0.5"/>
      <text x="51" y="19" text-anchor="middle" fill="#545454">TensorFlow</text>
    </g>
    <g transform="translate(710,52)">
      <rect width="88" height="28" rx="14" fill="#0D1017" stroke="#7A7A7A" stroke-opacity="0.5"/>
      <text x="44" y="19" text-anchor="middle" fill="#7A7A7A">OpenCV</text>
    </g>

    <!-- row 2 -->
    <g transform="translate(20,94)">
      <rect width="70" height="28" rx="14" fill="#0D1017" stroke="#A7A7A7" stroke-opacity="0.5"/>
      <text x="35" y="19" text-anchor="middle" fill="#A7A7A7">Docker</text>
    </g>
    <g transform="translate(98,94)">
      <rect width="130" height="28" rx="14" fill="#0D1017" stroke="#545454" stroke-opacity="0.5"/>
      <text x="65" y="19" text-anchor="middle" fill="#545454">GitHub Actions</text>
    </g>
    <g transform="translate(236,94)">
      <rect width="92" height="28" rx="14" fill="#0D1017" stroke="#7A7A7A" stroke-opacity="0.5"/>
      <text x="46" y="19" text-anchor="middle" fill="#7A7A7A">Supabase</text>
    </g>
    <g transform="translate(336,94)">
      <rect width="82" height="28" rx="14" fill="#0D1017" stroke="#A7A7A7" stroke-opacity="0.5"/>
      <text x="41" y="19" text-anchor="middle" fill="#A7A7A7">Ethereum</text>
    </g>
    <g transform="translate(426,94)">
      <rect width="78" height="28" rx="14" fill="#0D1017" stroke="#545454" stroke-opacity="0.5"/>
      <text x="39" y="19" text-anchor="middle" fill="#545454">Solidity</text>
    </g>
    <g transform="translate(512,94)">
      <rect width="72" height="28" rx="14" fill="#0D1017" stroke="#7A7A7A" stroke-opacity="0.5"/>
      <text x="36" y="19" text-anchor="middle" fill="#7A7A7A">FinTech</text>
    </g>
    <g transform="translate(592,94)">
      <rect width="80" height="28" rx="14" fill="#0D1017" stroke="#A7A7A7" stroke-opacity="0.5"/>
      <text x="40" y="19" text-anchor="middle" fill="#A7A7A7">Research</text>
    </g>
    <g transform="translate(680,94)">
      <rect width="94" height="28" rx="14" fill="#0D1017" stroke="#545454" stroke-opacity="0.5"/>
      <text x="47" y="19" text-anchor="middle" fill="#545454">Hackathons</text>
    </g>
    <g transform="translate(782,94)">
      <rect width="100" height="28" rx="14" fill="#0D1017" stroke="#7A7A7A" stroke-opacity="0.5"/>
      <text x="50" y="19" text-anchor="middle" fill="#7A7A7A">Open Source</text>
    </g>
  </g>

  <!-- animated status ticker -->
  <line x1="20" y1="142" x2="880" y2="142" stroke="#545454"/>
  <g font-family="JetBrains Mono, monospace" font-size="11" fill="#A7A7A7">
    <text x="20" y="164">BUILD</text>
    <text x="90" y="164" fill="#7A7A7A">passing</text>
    <text x="200" y="164">UPTIME</text>
    <text x="280" y="164" fill="#A7A7A7">continuous</text>
    <text x="400" y="164">MODE</text>
    <text x="460" y="164" fill="#545454">shipping</text>
    <text x="580" y="164">LEARNING</text>
    <text x="670" y="164" fill="#7A7A7A">always_on</text>
  </g>
  <circle cx="76" cy="160" r="3.5" fill="#7A7A7A" filter="url(#sGlow)">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>

  <!-- progress bars -->
  <g>
    <text x="20" y="196" font-family="JetBrains Mono, monospace" font-size="10" fill="#7A7A7A">AI/ML</text>
    <rect x="90" y="188" width="200" height="6" rx="3" fill="#343434"/>
    <rect x="90" y="188" width="168" height="6" rx="3" fill="#A7A7A7"/>

    <text x="320" y="196" font-family="JetBrains Mono, monospace" font-size="10" fill="#7A7A7A">FULLSTACK</text>
    <rect x="410" y="188" width="200" height="6" rx="3" fill="#343434"/>
    <rect x="410" y="188" width="150" height="6" rx="3" fill="#545454"/>

    <text x="640" y="196" font-family="JetBrains Mono, monospace" font-size="10" fill="#7A7A7A">FINTECH</text>
    <rect x="712" y="188" width="168" height="6" rx="3" fill="#343434"/>
    <rect x="712" y="188" width="112" height="6" rx="3" fill="#7A7A7A"/>
  </g>

  <g font-family="JetBrains Mono, monospace" font-size="8.5" fill="#3D4552">
    <text x="20" y="216">0x22 :: node/main</text>
    <text x="800" y="216">CIT · IN</text>
  </g>
</svg>
